<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private Zone - SAGA of SHORNO</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  height: 100vh;

  background: linear-gradient(-45deg, #0a0a0a, #001f1f, #000);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

@keyframes bgMove {
  0% {background-position: 0%;}
  50% {background-position: 100%;}
  100% {background-position: 0%;}
}

/* Loader */
.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: #00ffcc;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  z-index: 999;
}

/* Main Container */
.container {
  display: none;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 20px #00ffcc;
  width: 360px;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

/* Cards */
.card {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  text-decoration: none;
  color: #00ffcc;
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00ffcc;
}

/* Gallery */
.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  margin-top: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.1);
}

/* Footer */
.footer {
  margin-top: 15px;
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<!-- Loader -->
<div class="loader" id="loader">
  🔓 Access Granted...
</div>

<!-- Background Music -->
<audio autoplay loop>
  <source src="music.mp3">
</audio>

<!-- Main Content -->
<div class="container" id="main">

  <h1 id="welcome">Welcome 😎</h1>

  <!-- Cards -->
  <a class="card" href="https://drive.google.com" target="_blank">
    <i class="fa fa-image"></i> My Photos (Drive)
  </a>

  <a class="card" href="https://web.facebook.com/shahriar.shorno5071" target="_blank">
    <i class="fa-brands fa-facebook"></i> Facebook
  </a>

  <a class="card" href="https://instagram.com" target="_blank">
    <i class="fa-brands fa-instagram"></i> Instagram
  </a>

  <a class="card" href="https://threads.net" target="_blank">
    <i class="fa-brands fa-threads"></i> Threads
  </a>

  <!-- Gallery -->
  <div class="gallery">
    <img src="https://picsum.photos/100?1">
    <img src="https://picsum.photos/100?2">
    <img src="https://picsum.photos/100?3">
  </div>

  <div class="footer">
    🔒 Members Only
  </div>

</div>

<script>
// Loader delay
setTimeout(() => {
  document.getElementById("loader").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 2000);

// Get username from previous page
let name = localStorage.getItem("username");

if(name){
  document.getElementById("welcome").innerText = "Welcome, " + name + " 😎";
}
</script>

</body>
</html>
