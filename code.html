<!DOCTYPE html>
<html>
<head>
<title>SAGA of SONA</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.box {
  padding: 30px;
}

input {
  padding: 10px;
  width: 200px;
}

button {
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Enter Access Code</h2>

  <input type="password" id="code" placeholder="Enter Code">
  <br>
  <button onclick="checkCode()">Submit</button>

  <p id="msg" style="color:red;"></p>
</div>

<script>
function checkCode() {
  let code = document.getElementById("code").value;

  if (code === "001199") {
    window.location.href = "secret.html";
  } else {
    document.getElementById("msg").innerText = "Wrong Code!";
  }
}
</script>

</body>
</html>
