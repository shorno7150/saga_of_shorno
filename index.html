<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SAGA of SHORNO</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(-45deg, #0a0a0a, #001f1f, #000);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
}

@keyframes bgMove {
  0% {background-position: 0%;}
  50% {background-position: 100%;}
  100% {background-position: 0%;}
}

.box {
  width: 340px;
  padding: 30px;
  border-radius: 15px;
  text-align: center;

  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);

  box-shadow: 0 0 15px #00ffcc;

  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

h2 {
  margin-bottom: 20px;
}

.input-box {
  position: relative;
  margin: 15px 0;
}

.input-box input {
  width: 100%;
  padding: 12px 10px;
  padding-left: 35px;
  border: none;
  border-radius: 5px;
  outline: none;
}

.input-box i {
  position: absolute;
  left: 10px;
  top: 12px;
  color: gray;
}

.input-box label {
  position: absolute;
  left: 35px;
  top: 12px;
  color: gray;
  transition: 0.3s;
  pointer-events: none;
}

.input-box input:focus + label,
.input-box input:valid + label {
  top: -10px;
  font-size: 12px;
  color: #00ffcc;
}

input:focus {
  box-shadow: 0 0 10px #00ffcc;
  transform: scale(1.03);
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;

  background: linear-gradient(45deg, #00ffcc, #00ccff);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00ffcc;
}
</style>
</head>

<body>

<div class="box">
  <h2>SAGA of SONA</h2>

  <div class="input-box">
    <i class="fa fa-user"></i>
    <input type="text" id="name" required>
    <label>Your Name</label>
  </div>

  <div class="input-box">
    <i class="fa fa-school"></i>
    <input type="text" id="college" required>
    <label>Your College</label>
  </div>

  <div class="input-box">
    <i class="fa fa-calendar"></i>
    <input type="text" id="batch" required>
    <label>SSC Batch</label>
  </div>

  <button onclick="sendMsg()">Get Access</button>
</div>

<script>
function sendMsg() {

  let name = document.getElementById("name").value.trim();
  let college = document.getElementById("college").value.trim();
  let batch = document.getElementById("batch").value.trim();

  // Validation
  if(name === "" || college === "" || batch === ""){
    alert("⚠️ Please fill all fields!");
    return;
  }

  // ✅ Save username for next pages
  localStorage.setItem("username", name);

  // WhatsApp message
  let msg = `Name: ${name}%0ACollege: ${college}%0ABatch: ${batch}%0A%0AGive me the access code`;

  let url = "https://wa.me/8801858561346?text=" + msg;

  window.open(url, "_blank");

  // Confirm before redirect
  setTimeout(() => {
    if(confirm("Did you send the message on WhatsApp?")){
      window.location.href = "code.html";
    }
  }, 2000);
}
</script>

</body>
</html>
